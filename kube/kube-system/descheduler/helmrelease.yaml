---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: descheduler
  namespace: kube-system
spec:
  repo: https://kubernetes-sigs.github.io/descheduler/
  chart: descheduler
  version: 0.35.1
  targetNamespace: kube-system
  valuesContent: |-
    kind: CronJob
    schedule: "*/15 * * * *"
    activeDeadlineSeconds: 600
    successfulJobsHistoryLimit: 3
    failedJobsHistoryLimit: 3

    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi

    deschedulerPolicyAPIVersion: "descheduler/v1alpha2"

    deschedulerPolicy:
      profiles:
        - name: default
          pluginConfig:
            - name: DefaultEvictor
              args:
                # Allow evicting pods backed by Longhorn PVCs (cluster
                # storage), since volumes can re-attach across nodes. cnpg
                # primary pods are protected via PodDisruptionBudget so
                # descheduler will skip them.
                #
                # PodsWithPVC protection is already off by default (no
                # opt-in needed). PodsWithLocalStorage is on by default and
                # disabled here so pods using emptyDir/hostPath are still
                # considered.
                podProtections:
                  defaultDisabled:
                    - "PodsWithLocalStorage"
            - name: RemoveDuplicates
            - name: RemovePodsHavingTooManyRestarts
              args:
                podRestartThreshold: 100
                includingInitContainers: true
            - name: RemovePodsViolatingNodeAffinity
              args:
                nodeAffinityType:
                  - requiredDuringSchedulingIgnoredDuringExecution
            - name: RemovePodsViolatingNodeTaints
            - name: RemovePodsViolatingInterPodAntiAffinity
            - name: RemovePodsViolatingTopologySpreadConstraint
            - name: LowNodeUtilization
              args:
                # Underutilized: any node below all three thresholds.
                # Overutilized: any node above any of targetThresholds.
                # Tuned for the 4-node cluster where nl-k8s-01 (4C/16G)
                # disproportionately attracts pods.
                thresholds:
                  cpu: 30
                  memory: 30
                  pods: 30
                targetThresholds:
                  cpu: 70
                  memory: 70
                  pods: 60
          plugins:
            balance:
              enabled:
                - RemoveDuplicates
                - RemovePodsViolatingTopologySpreadConstraint
                - LowNodeUtilization
            deschedule:
              enabled:
                - RemovePodsHavingTooManyRestarts
                - RemovePodsViolatingNodeTaints
                - RemovePodsViolatingNodeAffinity
                - RemovePodsViolatingInterPodAntiAffinity
