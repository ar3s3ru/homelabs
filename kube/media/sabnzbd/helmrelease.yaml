---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: sabnzbd
  namespace: media
spec:
  repo: https://bjw-s-labs.github.io/helm-charts
  chart: app-template
  version: 4.6.2
  targetNamespace: media
  valuesContent: |-
    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 1000
        runAsUser: 1000
      # sabnzbd-downloads-v2 is a Longhorn volume with dataLocality=strict-local
      # and node/disk tags pinning its single replica to nl-k8s-01 or nl-k8s-04
      # (the two nodes with the large NVMe disks). Without this affinity, the
      # scheduler may place the pod on nl-k8s-02/03, which strict-local then
      # refuses to attach from.
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - nl-k8s-01
                      - nl-k8s-04

    service:
      main:
        type: ClusterIP
        controller: main
        ports:
          http:
            port: 8080

    ingress:
      tailscale:
        className: tailscale
        enabled: true
        hosts:
          - host: nl-sabnzbd
            paths:
              - path: "/"
                pathType: Prefix
                service:
                  identifier: main
                  port: http
        tls:
          - hosts: [nl-sabnzbd]

    controllers:
      main:
        type: deployment
        replicas: 1
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          main:
            env:
              PGID: 1000
              PGUID: 1000
              TZ: Europe/Amsterdam
            image:
              repository: ghcr.io/linuxserver/sabnzbd
              tag: 4.5.5@sha256:7ac6fe8a521c7099e1768af90529dfee5976b87c7dccffdcc9ced00149e1aedb
            probes:
              liveness: { enabled: false }
              readiness: { enabled: false }
              startup: { enabled: true }

    persistence:
      config:
        enabled: true
        existingClaim: sabnzbd-config-v2
        globalMounts: [{ path: /config }]
        type: persistentVolumeClaim
      downloads:
        enabled: true
        # NOTE: this PVC is managed manually in Longhorn, not as a PVC
        # in a kubernetes manifest. This is due to size and custom configuration.
        existingClaim: sabnzbd-downloads-v2
        globalMounts: [{ path: /downloads }]
        type: persistentVolumeClaim
      media:
        enabled: true
        existingClaim: media-data-v4
        globalMounts: [{ path: /data }]
        type: persistentVolumeClaim
