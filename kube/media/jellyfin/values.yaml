---
image:
  repository: docker.io/jellyfin/jellyfin
  tag: 10.11.8@sha256:1694ff069f0c9dafb283c36765175606866769f5d72f2ed56b6a0f1be922fc37

replicaCount: 1
deploymentStrategy:
  type: Recreate # Using RWO backing volume.

podSecurityContext:
  fsGroup: 1000
  fsGroupChangePolicy: OnRootMismatch
  runAsGroup: 1000
  runAsUser: 1000

podAnnotations:
  reloader.stakater.com/auto: "true"

affinity:
  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
            - key: cianfr.one/gpu.transcoding.speed
              operator: In
              values:
                - fast
      - weight: 50
        preference:
          matchExpressions:
            - key: cianfr.one/gpu.transcoding.speed
              operator: In
              values:
                - medium

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: cianfr.one-acme
    external-dns.alpha.kubernetes.io/hostname: &host media.cianfr.one
    external-dns.alpha.kubernetes.io/target: in.nl.cianfr.one
  hosts:
    - host: *host
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts: [*host]
      secretName: jellyfin-tls

resources:
  limits:
    gpu.intel.com/i915: "1"
  requests:
    gpu.intel.com/i915: "1"

volumes:
  - name: media-data
    persistentVolumeClaim:
      claimName: media-data-v4
  - name: media-videos
    persistentVolumeClaim:
      claimName: media-videos-v1

volumeMounts:
  - name: media-data
    mountPath: /data
  - name: media-videos
    mountPath: /videos

persistence:
  config:
    enabled: true
    existingClaim: jellyfin-config-v2
  media:
    enabled: false # Managed separately and manually.
