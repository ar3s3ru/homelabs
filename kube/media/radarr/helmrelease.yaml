---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: radarr
  namespace: media
spec:
  repo: https://bjw-s-labs.github.io/helm-charts
  chart: app-template
  version: 4.6.2
  targetNamespace: media
  valuesContent: |-
    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 1000
        runAsUser: 1000

    service:
      main:
        type: ClusterIP
        controller: main
        ports:
          http:
            port: 7878

    ingress:
      tailscale:
        className: tailscale
        enabled: true
        hosts:
          - host: nl-radarr
            paths:
              - path: "/"
                pathType: Prefix
                service:
                  identifier: main
                  port: http
        tls:
          - hosts: [nl-radarr]

    controllers:
      main:
        type: deployment
        replicas: 1
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          main:
            env:
              PGID: 1000
              PGUID: 1000
              TZ: Europe/Amsterdam
            image:
              repository: ghcr.io/linuxserver/radarr
              tag: 6.1.1@sha256:659e5f20500948b1491f31dd85c6f99a43508ce3e46595793e1e15aa955bf6d7
            probes:
              liveness: { enabled: false }
              readiness: { enabled: false }
              startup: { enabled: true }

    persistence:
      config:
        enabled: true
        existingClaim: radarr-config-v2
        globalMounts: [{ path: /config }]
        type: persistentVolumeClaim
      media:
        enabled: true
        existingClaim: media-data-v4
        globalMounts: [{ path: /data }]
        type: persistentVolumeClaim
