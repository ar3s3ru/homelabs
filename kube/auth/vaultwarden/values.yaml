---
image:
  repository: ghcr.io/dani-garcia/vaultwarden
  tag: 1.35.8@sha256:c4f6056fe0c288a052a223cecd263a90d1dda1a0177bb5b054a363a6c7b211d9
  pullPolicy: IfNotPresent

# FIXME: review these limits
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

replicaCount: 1

database:
  type: sqlite
  wal: true

service:
  type: ClusterIP
  httpPort: 80
  externalTrafficPolicy: Cluster

strategy:
  type: RollingUpdate # Longhorn volume is ReadWriteMany, so we can do rolling updates.

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: cianfr.one-acme
    external-dns.alpha.kubernetes.io/hostname: &host vault.cianfr.one
    external-dns.alpha.kubernetes.io/target: in.nl.cianfr.one
  host: *host
  tls:
    - hosts: [*host]
      secretName: vaultwarden-cianfr.one-tls

persistence:
  enabled: true
  existingClaim: vaultwarden-v2

vaultwarden:
  domain: https://vault.cianfr.one
  allowSignups: false
  requireEmail: true
  verifySignup: true
  allowInvitation: true
  showPasswordHint: true
  enableWebVault: true
  orgCreationUsers: danilocianfr@gmail.com

  admin:
    enabled: true

  smtp:
    enabled: true
    host: smtp.gmail.com
    from: "nl.homelab.ar3s3ru@gmail.com"
    port: "587"
    existingSecret: vaultwarden-secrets
