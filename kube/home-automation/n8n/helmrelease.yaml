---
# n8n workflow automation, queue-mode, Tailscale-only.
# Chart ref: https://github.com/8gears/n8n-helm-chart
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: n8n
  namespace: &namespace home-automation
spec:
  chart: oci://8gears.container-registry.com/library/n8n
  version: 2.0.1
  targetNamespace: *namespace
  valuesContent: |-
    image:
      repository: n8nio/n8n
      tag: 2.19.0@sha256:db0b9941d16b31d1e79b73b6c170de2342696de9136ed1c0f1bab970d9cfc817
      pullPolicy: IfNotPresent

    # Global ingress: Tailscale-only, served by the main pod.
    ingress:
      enabled: true
      className: tailscale
      annotations: {}
      hosts:
        - host: &host nl-n8n.tail2ff90.ts.net
          paths:
            - path: /
              pathType: Prefix
      tls:
        - hosts:
            - *host

    # # # # # # # # # # # # # # # #
    # Main (editor UI + webhooks)
    # # # # # # # # # # # # # # # #
    main:
      # Values transformed 1:1 into ENV variables (see chart README).
      config:
        generic:
          timezone: Europe/Amsterdam
        executions_mode: queue
        n8n:
          editor_base_url: &url https://nl-n8n.tail2ff90.ts.net/
          # Trust the Tailscale ingress proxy for client IP resolution.
          proxy_hops: 1
        # Webhooks processed by the main pod (no dedicated webhook deployment).
        webhook_url: *url
        db:
          type: postgresdb
          postgresdb:
            host: n8n-cnpg-cluster-rw.home-automation.svc.cluster.local
            port: 5432
            database: n8n
            pool:
              size: 5
        queue:
          health:
            check:
              active: true
          bull:
            redis:
              host: n8n-redis.home-automation.svc.cluster.local
              port: 6379

      extraEnv: &extraEnv
        # Shadow the Kubernetes-injected service-link env var
        # (N8N_PORT=tcp://<svc-ip>:5678) that n8n misparses as its own
        # listen-port config. The value matches the chart default.
        N8N_PORT:
          value: "5678"
        DB_POSTGRESDB_USER:
          valueFrom:
            secretKeyRef:
              name: n8n-cnpg-cluster-app
              key: username
        DB_POSTGRESDB_PASSWORD:
          valueFrom:
            secretKeyRef:
              name: n8n-cnpg-cluster-app
              key: password
        N8N_ENCRYPTION_KEY:
          valueFrom:
            secretKeyRef:
              name: n8n-secrets
              key: N8N_ENCRYPTION_KEY

      # All durable state lives in Postgres. /home/node/.n8n is used only for
      # transient scratch (crash journal, node cache) - emptyDir avoids the
      # RWO multi-attach problem when workers replicate > 1.
      persistence:
        enabled: true
        type: emptyDir

      replicaCount: 1
      deploymentStrategy:
        type: Recreate

      podAnnotations:
        reloader.stakater.com/auto: "true"

      podSecurityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

      service:
        type: ClusterIP
        port: 5678

      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          memory: 2Gi

      livenessProbe:
        httpGet:
          path: /healthz
          port: http
        initialDelaySeconds: 30
        periodSeconds: 30
        timeoutSeconds: 5
        failureThreshold: 6
      readinessProbe:
        httpGet:
          path: /healthz
          port: http
        initialDelaySeconds: 10
        periodSeconds: 15
        timeoutSeconds: 5
        failureThreshold: 6

    # # # # # # # # # # # # # # # #
    # Workers (queue consumers)
    # # # # # # # # # # # # # # # #
    worker:
      enabled: true
      replicaCount: 2
      concurrency: 10

      # Workers share DB + Redis + encryption key with the main pod.
      extraEnv: *extraEnv

      # Workers mount /home/node/.n8n (chart-hardcoded), but all durable state
      # is in Postgres. Each worker gets its own emptyDir scratch.
      persistence:
        enabled: true
        type: emptyDir

      deploymentStrategy:
        type: RollingUpdate

      podAnnotations:
        reloader.stakater.com/auto: "true"

      podSecurityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

      resources:
        requests:
          cpu: 100m
          memory: 384Mi
        limits:
          memory: 1Gi

      # The worker pods expose /healthz on the chart's default http port.
      livenessProbe:
        httpGet:
          path: /healthz
          port: http
        initialDelaySeconds: 30
        periodSeconds: 30
        timeoutSeconds: 5
        failureThreshold: 6
      readinessProbe:
        httpGet:
          path: /healthz
          port: http
        initialDelaySeconds: 10
        periodSeconds: 15
        timeoutSeconds: 5
        failureThreshold: 6

    # Webhook handled by the main pod - dedicated webhook deployment disabled.
    webhook:
      enabled: false

    # Internal Valkey bundled with the chart is disabled: we use the
    # ot-container-kit Redis operator deployment instead (see helmrelease-redis.yaml).
    valkey:
      enabled: false
