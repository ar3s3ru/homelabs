---
# Standalone Redis for n8n queue mode (BullMQ).
# Ref: https://github.com/OT-CONTAINER-KIT/redis-operator/tree/main/charts/redis
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: n8n-redis
  namespace: &namespace home-automation
spec:
  repo: https://ot-container-kit.github.io/helm-charts
  chart: redis
  version: 0.16.9
  targetNamespace: *namespace
  valuesContent: |-
    # Storage configuration
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          storageClassName: longhorn-nvme-3-replicas
          resources:
            requests:
              storage: 1Gi

    # FIXME: this is a hack to make sure that redisConfig is rendered properly,
    # and not assigned to 'null', which was preventing ArgoCD from syncing.
    externalConfig:
      enabled: true
      data: ""

    # Enable Redis exporter for Prometheus monitoring
    redisExporter:
      enabled: true

    # Enable ServiceMonitor for Prometheus
    serviceMonitor:
      enabled: true
