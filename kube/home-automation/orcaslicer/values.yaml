---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/values.schema.json
defaultPodOptions:
  securityContext:
    # runAsNonRoot: true
    # runAsUser: 1000
    # runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch

controllers:
  main:
    type: deployment
    replicas: 1
    annotations:
      reloader.stakater.com/auto: "true"
    containers:
      main:
        image:
          repository: ghcr.io/linuxserver/orcaslicer
          tag: 2.3.2@sha256:b001363fe8f05918d541ff8de543a253cce060e86eb3d73de717e314f2f4ab27
        env:
          TZ: Europe/Amsterdam
          # Source: https://docs.linuxserver.io/images/docker-orcaslicer/#hardware-acceleration-the-move-to-wayland
          PIXELFLUX_WAYLAND: "true"
          DRINODE: /dev/dri/renderD128
          GTK_THEME: Adwaita:dark # segfaults if no theme is set
          PGID: "1000"
          PUID: "1000"
        probes:
          # FIXME(ar3s3ru): find a way to enable these?
          liveness: { enabled: false }
          readiness: { enabled: false }
          startup: { enabled: false }
        resources:
          requests:
            gpu.intel.com/i915: "1"
          limits:
            gpu.intel.com/i915: "1"

service:
  main:
    type: ClusterIP
    controller: main
    ports:
      http:
        port: 3000

ingress:
  tailscale:
    enabled: true
    className: tailscale
    hosts:
      - host: &host nl-orcaslicer.tail2ff90.ts.net
        paths:
          - path: /
            pathType: Prefix
            service: { identifier: main, port: http }
    tls:
      - hosts:
          - *host

persistence:
  tmpfs:
    type: emptyDir
    globalMounts:
      - { path: /run, subPath: run }
      - { path: /tmp, subPath: tmp }
      - { path: /config, subPath: config }
      - { path: /config/.config/OrcaSlicer/log, subPath: log }
      - { path: /config/.config/OrcaSlicer/cache, subPath: cache }
  config:
    type: persistentVolumeClaim
    existingClaim: orcaslicer-config
    globalMounts:
      - { path: /config/.config/OrcaSlicer, subPath: orcaslicer }
      - { path: /config/models, subPath: models }
