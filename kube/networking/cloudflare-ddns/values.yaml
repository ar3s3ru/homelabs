---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/values.schema.json
defaultPodOptions:
  hostNetwork: true # Required for IPv6 detection.
  securityContext:
    runAsUser: 1000
    runAsGroup: 1000

controllers:
  main:
    type: deployment
    replicas: 1
    strategy: Recreate

    annotations:
      reloader.stakater.com/auto: "true"

    containers:
      main:
        image:
          repository: docker.io/favonia/cloudflare-ddns
          tag: edge-alpine@sha256:7160a0d1b003e7c6aa985a1b5e5afc7860f1d7cadca9c5f63bb3925c874f2d62
        probes:
          # FIXME(ar3s3ru): find a way to enable these?
          liveness: { enabled: false }
          readiness: { enabled: false }
          startup: { enabled: false }
        env:
          PROXIED: false
        envFrom:
          - configMapRef: { name: cloudflare-ddns-env }
          - secretRef: { name: cloudflare-ddns-secrets }
