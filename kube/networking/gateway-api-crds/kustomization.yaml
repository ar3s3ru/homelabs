---
# yaml-language-server: $schema=https://www.schemastore.org/kustomization.json
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Gateway API CRDs (standard channel) — required by Cilium's Gateway API
# implementation. Pulled directly from the upstream release so the version
# is explicit, auditable, and bumped via a single URL change.
#
# Standard channel includes: GatewayClass, Gateway, HTTPRoute, GRPCRoute,
# ReferenceGrant. Cilium 1.19.x supports Gateway API v1.2.x.
#
# Sync-wave -10 ensures CRDs are applied before any Gateway/HTTPRoute
# consumers. ArgoCD orders CRD-before-CR within a single Application, but
# Gateway/HTTPRoute resources live in separate Applications (kube/<ns>/<app>/).
commonAnnotations:
  argocd.argoproj.io/sync-wave: "-10"

resources:
  - https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.2.0/standard-install.yaml
