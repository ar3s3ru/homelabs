---
# Advertise LoadBalancer Service IPs to BGP peers.
# Selected by the matchLabels rule in the peer configs (advertise: bgp).
apiVersion: cilium.io/v2
kind: CiliumBGPAdvertisement
metadata:
  name: services
  labels:
    advertise: bgp
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  advertisements:
    - advertisementType: Service
      service:
        addresses:
          - LoadBalancerIP
      selector:
        matchExpressions:
          - key: somekey
            operator: NotIn
            values: ["never-match"]
